# AXA DevSecOps Reference: Pre-commit hook configuration
#
# Install once per developer machine:
#   pip install pre-commit
#   pre-commit install
#
# After installation, every `git commit` triggers these checks LOCALLY,
# before the commit lands. This catches secrets before they touch git history.
#
# Stage 1 in the AXA DevSecOps lifecycle.
# AXA: SSDLC-DEV-03 (Secret Management, mandatory secret exposure review)

repos:

  # Gitleaks: detects secrets (API keys, tokens, passwords) in staged files
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Basic hygiene checks (whitespace, large files, merge conflicts)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  # Detect AWS credentials specifically (belt and suspenders with Gitleaks)
  - repo: https://github.com/awslabs/git-secrets
    rev: 1.3.0
    hooks:
      - id: git-secrets
