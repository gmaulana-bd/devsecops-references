# AXA DevSecOps Reference: application.properties
#
# IMPORTANT: this file MUST NOT contain hardcoded credentials.
# Per AXA SSDLC-DEV-03 and CLDEV-IAM-02, all secrets are injected at runtime
# from a vault (CyberArk in production, .env locally) via environment variables.
#
# The ${VAR:default} syntax reads from environment, falling back to default.
# Defaults here are intentionally non-sensitive (placeholder URLs, port numbers).

server.port=${SERVER_PORT:8080}
spring.application.name=${APP_NAME:axa-devsecops-reference}

# Database connection (example - this app does not actually use a DB,
# but the pattern is shown for reference)
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Actuator endpoints: expose health for the K8s liveness probe, nothing else
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging: structured JSON in production
logging.level.root=${LOG_LEVEL:INFO}
